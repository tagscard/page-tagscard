<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tagscard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .login-logo {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            display: inline-block;
        }

        .login-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.08);
        }

        .btn-login {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .login-footer {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-site {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .back-to-site:hover {
            color: white;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-site">
        <i class="fas fa-arrow-left"></i> Voltar ao site
    </a>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>

    <div class="login-card">
        <div class="login-logo">
            <img src="assets/logo.png" alt="Tagscard Logo" style="height: 50px;">
        </div>
        <div class="login-header">
            <h2>Bem-vindo de volta</h2>
            <p>Gerencie seu perfil digital Tagscard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">Entrar no Painel</button>
        </form>

        <div id="loginError" style="color: #ff4444; font-size: 0.85rem; margin-top: 15px; display: none;">
            Erro ao entrar. Verifique suas credenciais.
        </div>

        <div class="login-footer">
            Ainda não tem um Tagscard? <a href="index.html#pricing">Pedir agora</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            const btn = e.target.querySelector('button');

            btn.innerText = 'Autenticando...';
            btn.disabled = true;

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                btn.innerText = 'Entrar no Painel';
                btn.disabled = false;
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            } else {
                // Sessão gerenciada automaticamente pelo Supabase Client (cookies/localStorage)
                window.location.href = 'profile.html';
            }
        });
    </script>
</body>
</html>
