<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tagscard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .login-logo {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            display: inline-block;
        }

        .login-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.08);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-password:hover {
            color: white;
        }

        .btn-login {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-site">
        <i class="fas fa-arrow-left"></i> Voltar ao site
    </a>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>

    <div class="login-card">
        <div class="login-logo">
            <img src="assets/logo.png" alt="Tagscard Logo" style="height: 50px;">
        </div>
        <div class="login-header">
            <h2>Bem-vindo de volta</h2>
            <p>Gerencie seu perfil digital Tagscard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
                <a href="#" class="forgot-password" id="forgotBtn">Esqueci minha senha</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">Entrar no Painel</button>
        </form>

        <div id="loginError" style="color: #ff4444; font-size: 0.85rem; margin-top: 15px; display: none; padding: 10px; border-radius: 8px; background: rgba(255,68,68,0.1);">
            Erro ao entrar. Verifique suas credenciais.
        </div>

        <div class="login-footer">
            Ainda não tem um Tagscard? <a href="index.html#pricing">Pedir agora</a>
        </div>
    </div>

    <script>
        // Toggle de Senha
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Esqueci a Senha
        document.getElementById('forgotBtn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Para recuperar sua senha, entre em contato com nosso suporte via WhatsApp.');
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');
            const btn = e.target.querySelector('button');

            btn.innerText = 'Autenticando...';
            btn.disabled = true;

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                btn.innerText = 'Entrar no Painel';
                btn.disabled = false;
            } else {
                // Verificar status do pagamento no perfil
                const { data: profile, error: profError } = await window.supabaseClient
                    .from('profiles')
                    .select('payment_status')
                    .eq('id', data.user.id)
                    .single();

                if (profile && profile.payment_status === 'pending') {
                    errorMsg.innerText = "Após a confirmação de pagamento o Painel estará acessível.";
                    errorMsg.style.display = 'block';
                    btn.innerText = 'Entrar no Painel';
                    btn.disabled = false;
                    // Opcional: fazer logout se quiser ser rigoroso
                    // await window.supabaseClient.auth.signOut();
                } else {
                    window.location.href = 'profile.html';
                }
            }
        });
    </script>
</body>
</html>
