<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha | Tagscard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .login-header h2 { font-size: 1.8rem; margin-bottom: 10px; }
        .login-header p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }

        .btn-reset { width: 100%; margin-top: 10px; }
        
        #errorMsg { color: #ff4444; font-size: 0.85rem; margin-top: 15px; display: none; padding: 10px; border-radius: 8px; background: rgba(255,68,68,0.1); }
        #successMsg { color: #28a745; font-size: 0.85rem; margin-top: 15px; display: none; padding: 15px; border-radius: 8px; background: rgba(40,167,69,0.1); }
    </style>
</head>
<body>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>

    <div class="login-card">
        <div class="login-header">
            <h2>Nova Senha</h2>
            <p>Escolha uma senha forte para sua segurança</p>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirmar Senha</label>
                <input type="password" id="confirm-password" placeholder="Repita a nova senha" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-reset">Atualizar Senha</button>
        </form>

        <div id="errorMsg"></div>
        <div id="successMsg">
            <i class="fas fa-check-circle"></i> Senha atualizada com sucesso! Redirecionando para o login...
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = e.target.querySelector('button');

            if (newPassword !== confirmPassword) {
                errorMsg.innerText = "As senhas não coincidem.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.innerText = 'Atualizando...';
            btn.disabled = true;

            const { error } = await window.supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                btn.innerText = 'Atualizar Senha';
                btn.disabled = false;
            } else {
                errorMsg.style.display = 'none';
                resetForm.style.display = 'none';
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>
